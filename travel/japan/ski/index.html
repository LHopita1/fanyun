              {/* 推薦住宿 */}
              <div className="bg-white rounded-[2rem] p-6 md:p-8 border border-slate-100 shadow-lg mb-8">
                <h3 className="text-2xl font-bold text-indigo-800 mb-6 flex items-center gap-2">
                  <Bed className="w-7 h-7 text-indigo-500" /> 鄰近住宿推薦 (精選三間)
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {resort.accommodations.map((acc, idx) => (
                          <div key={idx} className="bg-slate-50 p-5 rounded-2xl border border-slate-100 hover:border-indigo-200 transition-colors">
                            <h4 className="text-lg font-bold text-indigo-900 mb-2">{acc.name}</h4>
                            <p className="text-sm text-slate-600 leading-relaxed">{acc.desc}</p>
                          </div>
                  ))}
                </div>
              </div>

              {/* 周邊推薦景點 */}
              <div className="bg-white rounded-[2rem] p-6 md:p-8 border border-slate-100 shadow-lg mb-16">
                <h3 className="text-2xl font-bold text-pink-700 mb-6 flex items-center gap-2">
                  <Camera className="w-7 h-7 text-pink-500" /> 周邊推薦景點 (精選三個)
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {resort.attractions.map((attr, idx) => (
                          <div key={idx} className="bg-pink-50/30 p-5 rounded-2xl border border-pink-100 hover:border-pink-200 transition-colors">
                            <h4 className="text-lg font-bold text-pink-900 mb-2">{attr.name}</h4>
                            <p className="text-sm text-slate-600 leading-relaxed">{attr.desc}</p>
                          </div>
                  ))}
                </div>
              </div>

              {/* 底部導航地圖 */}
              <div className="pt-12 border-t border-slate-200">
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-black text-slate-700">想看看其他地區嗎？</h2>
                </div>
                <JapanMap onRegionClick={onRegionClick} />
                <div className="text-center mt-10">
                  <button onClick={onBack} className="bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 px-10 rounded-full shadow-xl shadow-sky-500/30 transition-all hover:-translate-y-1 cursor-pointer">
                    回首頁
                  </button>
                </div>
              </div>
            </div>
    );
  };

  // --- 主應用程式 ---
  function App() {
    const [view, setView] = useState('home');
    const [selectedResort, setSelectedResort] = useState(null);
    const [isModalOpen, setIsModalOpen] = useState(false);
    const [activeRegion, setActiveRegion] = useState(null);
    const [isMenuModalOpen, setIsMenuModalOpen] = useState(false);

    const handleRegionClick = (regionId) => {
      setActiveRegion(regionId);
      setIsModalOpen(true);
    };

    const handleSelectResort = (resort) => {
      setSelectedResort(resort);
      setIsModalOpen(false);
      setView('detail');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const handleBackToHome = () => {
      setView('home');
      setSelectedResort(null);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    return (
            <div className="min-h-screen relative font-sans selection:bg-sky-200 selection:text-sky-900">
              <SnowBackground />

              <nav className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-white/50 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex items-center justify-between h-16 md:h-20">
                    <div className="flex-1 md:hidden"></div>
                    <div className="flex-1 hidden md:flex"></div>

                    <button onClick={handleBackToHome} className="flex items-center gap-3 group cursor-pointer justify-center">
                      <Snowflake className="w-8 h-8 text-sky-500 group-hover:rotate-90 transition-transform duration-500" />
                      <span className="text-2xl md:text-3xl font-black text-slate-800 tracking-wider whitespace-nowrap">
                  日本滑雪場推薦
                </span>
                    </button>

                    <div className="flex-1 flex justify-end">
                      <button onClick={() => setIsMenuModalOpen(true)} className="flex items-center gap-2 bg-white border border-sky-200 text-sky-700 hover:bg-sky-50 font-bold py-1.5 px-3 md:py-2 md:px-4 rounded-xl shadow-sm transition-all cursor-pointer">
                        <MenuIcon className="w-5 h-5" />
                        <span className="hidden sm:inline">更多地圖</span>
                      </button>
                    </div>
                  </div>
                </div>
              </nav>

              <main className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
                {view === 'home' && (
                        <div className="space-y-16 animate-in fade-in duration-700">
                          <section className="text-center space-y-6 mt-4 relative z-20">
                            <h1 className="text-4xl md:text-6xl font-black text-slate-800 tracking-tight drop-shadow-sm">
                              享受極致粉雪的冬日之旅
                            </h1>
                            <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto font-medium leading-relaxed">
                              完整收錄全日本 45 座人氣口碑滑雪度假村。透過下方地圖探索，規劃您的完美玩雪假期。
                            </p>
                          </section>

                          <section>
                            <JapanMap onRegionClick={handleRegionClick} />
                          </section>

                          <section className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto mt-12 relative z-20">
                            <div className="bg-white p-8 md:p-10 rounded-[2.5rem] border border-sky-50 shadow-xl">
                              <h2 className="text-2xl font-bold text-sky-800 mb-6 flex items-center gap-2 border-b border-sky-100 pb-4">
                                <Mountain className="w-6 h-6 text-sky-500" /> 認識滑雪運動
                              </h2>
                              <div className="space-y-6">
                                <div>
                                  <h4 className="font-bold text-indigo-700 mb-2 bg-indigo-50 inline-block px-3 py-1 rounded-full text-sm">單板滑雪 (Snowboard)</h4>
                                  <p className="text-slate-600 text-sm leading-relaxed">雙腳固定在一塊板子上側身滑行，入門時容易摔倒（尤其是摔屁股和膝蓋），但一旦抓到平衡感進步速度會非常快，是年輕人非常喜愛的帥氣選擇。</p>
                                </div>
                                <div>
                                  <h4 className="font-bold text-cyan-700 mb-2 bg-cyan-50 inline-block px-3 py-1 rounded-full text-sm">雙板滑雪 (Ski)</h4>
                                  <p className="text-slate-600 text-sm leading-relaxed">雙腳各踩一塊細長的板子，手持雪杖面向前方滑行。因為站姿較符合人類步行習慣，第一天相對容易站立，非常適合親子或希望快速體驗滑雪樂趣的遊客。</p>
                                </div>
                              </div>
                            </div>

                            <div className="bg-white p-8 md:p-10 rounded-[2.5rem] border border-sky-50 shadow-xl">
                              <h2 className="text-2xl font-bold text-sky-800 mb-6 flex items-center gap-2 border-b border-sky-100 pb-4">
                                <Info className="w-6 h-6 text-sky-500" /> 滑雪安全與注意事項
                              </h2>
                              <ul className="space-y-4 text-slate-600">
                                <li className="flex gap-3 items-start">
                                  <span className="text-sky-500 font-bold bg-sky-50 w-6 h-6 flex items-center justify-center rounded-full shrink-0">1</span>
                                  <p className="text-sm leading-relaxed"><strong>防護裝備不可少：</strong> 絕對要佩戴安全帽與雪鏡。雪鏡可防止雪盲症，安全帽則是保護頭部的最後防線。</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                  <span className="text-sky-500 font-bold bg-sky-50 w-6 h-6 flex items-center justify-center rounded-full shrink-0">2</span>
                                  <p className="text-sm leading-relaxed"><strong>洋蔥式穿法：</strong> 內層排汗、中層保暖、外層防水防風，依體溫變化隨時穿脫。</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                  <span className="text-sky-500 font-bold bg-sky-50 w-6 h-6 flex items-center justify-center rounded-full shrink-0">3</span>
                                  <p className="text-sm leading-relaxed"><strong>量力而為：</strong> 初學者切勿輕易上高級道。摔倒時請勿用手腕撐地，應順勢側摔以減少受傷。</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                  <span className="text-sky-500 font-bold bg-sky-50 w-6 h-6 flex items-center justify-center rounded-full shrink-0">4</span>
                                  <p className="text-sm leading-relaxed"><strong>請專業教練：</strong> 第一次滑雪強烈建議請專業教練指導，能大幅減少摸索期的挫折感與受傷風險。</p>
                                </li>
                              </ul>
                            </div>
                          </section>
                        </div>
                )}

                {view === 'detail' && (
                        <ResortDetailView resort={selectedResort} onBack={handleBackToHome} onRegionClick={handleRegionClick} />
                )}
              </main>

              {/* 區域選單 Modal */}
              <RegionModal region={activeRegion} isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSelectResort={handleSelectResort} />

              {/* 新增：右上角選單 Modal */}
              <MoreInfoModal isOpen={isMenuModalOpen} onClose={() => setIsMenuModalOpen(false)} />

              <footer className="mt-12 bg-white/50 border-t border-white py-8 text-center text-slate-400 text-sm relative z-20 backdrop-blur-sm">
                <p>2026 &copy; 日本滑雪場推薦網. All rights reserved by FY Chen.</p>
              </footer>
            </div>
    );
  }

  const rootElement = document.getElementById('root');
  const root = ReactDOM.createRoot(rootElement);
  root.render(<App />);
</script>
</body>
</html>
